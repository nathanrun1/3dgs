; Specifies which shader to use for each shader stage. Paths should be either absolute or relative to working directory.
[shaders]
comp = res/shaders/project_splat.comp
vert = res/shaders/splat.vert
frag = res/shaders/splat.frag
points_vert = res/shaders/points.vert
points_frag = res/shaders/red.frag

[radix_sort]
upsweep = res/shaders/sort/blelloch_upsweep.comp
downsweep = res/shaders/sort/blelloch_downsweep.comp
top = res/shaders/sort/blelloch_top.comp
build_histogram = res/shaders/sort/build_histogram.comp
local_sort = res/shaders/sort/local_sort.comp

; Other file paths
[paths]
include = res/shaders
